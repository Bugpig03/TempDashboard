version: '3.8'

services:
  mike-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mike_serveur_app
    restart: always
    ports:
      - "5010:5010"
    environment:
      # On utilise les variables d'environnement que tu configureras dans Portainer
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - FLASK_ENV=production
    volumes:
      # Volume pour que tes sons persistent et soient modifiables sur le serveur
      - mike_sounds:/app/static/sound

volumes:
  mike_sounds: